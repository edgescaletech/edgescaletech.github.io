<svg viewBox="0 0 1440 900" width="1440" height="900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="blobIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="900" x2="1440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="45%" stop-color="#818CF8" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="vignette" x1="720" y1="0" x2="720" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07090F" stop-opacity="0.55"/>
      <stop offset="38%" stop-color="#07090F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090F" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1440" height="900" fill="#07090F"/>

  <!-- aurora glow blobs -->
  <g filter="url(#soft)">
    <ellipse cx="250" cy="120" rx="430" ry="320" fill="url(#blobIndigo)"/>
    <ellipse cx="1230" cy="180" rx="460" ry="340" fill="url(#blobCyan)"/>
    <ellipse cx="760" cy="40" rx="360" ry="260" fill="url(#blobViolet)"/>
    <ellipse cx="980" cy="640" rx="420" ry="300" fill="url(#blobIndigo)" opacity="0.5"/>
  </g>

  <!-- flowing growth curves now live as an animated inline layer in the page -->

  <!-- film grain texture -->
  <rect width="1440" height="900" filter="url(#grain)" opacity="0.04" style="mix-blend-mode:screen"/>

  <!-- legibility vignette -->
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>
